{% extends "base.html" %}

{% block title %}{{ title }} | Travel Health Advisory{% endblock %}
{% block page_class %}page-error{% endblock %}

{% block content %}
<section class="surface error-card">
    <p class="eyebrow">Travel Health Advisory</p>
    <h1>{{ title }}</h1>
    <p class="section-text">{{ message }}</p>
    <div class="error-actions">
        <a class="btn btn-primary" href="{{ url_for('landing') }}">Return home</a>
        {% if current_user %}
        <a class="btn btn-secondary" href="{{ url_for('assessment') }}">Open assessment</a>
        {% endif %}
    </div>
</section>
{% endblock %}
